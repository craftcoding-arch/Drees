<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', system-ui, sans-serif;
            font-size: 12px;
            border-radius: 0 !important;
        }
        body {
            background: linear-gradient(135deg, #fef9f7, #fff5f2);
            color: #2d1b1b;
            padding: 1.5rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            padding: 1.8rem;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: #c44536;
        }
        .back-link {
            color: #2c3e2f;
            text-decoration: none;
            font-weight: 700;
        }
        .layout {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .hero-img {
            width: 100%;
            max-height: 640px;
            min-height: 420px;
            object-fit: contain;
            background: #f7edea;
            padding: 18px;
            border: 1px solid #eadad3;
        }
        .info h1 {
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
        }
        .pill {
            display: inline-block;
            background: #f0e1dc;
            color: #c44536;
            padding: 0.3rem 0.8rem;
            margin-bottom: 0.7rem;
            font-weight: 700;
        }
        .price {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0.6rem 0;
        }
        .desc {
            line-height: 1.6;
            color: #5b4744;
            margin: 0.4rem 0 1rem;
        }
        .meta { margin: 0.3rem 0; color: #5b4744; font-weight: 700; }
        .list-row { margin: 0.25rem 0; color: #6b5652; }
        .actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            cursor: pointer;
            padding: 0.65rem 1.2rem;
            color: #fff;
            font-weight: 700;
            background: #c44536;
        }
        .btn.secondary { background: #2c3e2f; }
        .small-note { color: #8a6f68; margin-top: 0.4rem; }
        .empty-msg { padding: 2rem; text-align: center; color: #8a6f68; }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="logo">💍 ليالي الزفاف</div>
        <a class="back-link" href="index.html">عودة للمتجر</a>
    </div>
    <div id="content" class="layout">
        <img id="productImage" class="hero-img" src="" alt="">
        <div class="info">
            <div class="pill" id="productCategory"></div>
            <h1 id="productTitle"></h1>
            <div class="price" id="productPrice"></div>
            <div class="meta" id="productCode"></div>
            <div class="meta" id="productSize"></div>
            <p class="desc" id="productDesc"></p>
            <div class="list-row"><strong>الأقمشة:</strong> <span id="fabricList"></span></div>
            <div class="list-row"><strong>الموديلات:</strong> <span id="modelList"></span></div>
            <div class="list-row"><strong>الرقبات:</strong> <span id="neckList"></span></div>
            <div class="list-row"><strong>الأكمام:</strong> <span id="sleeveList"></span></div>
            <div class="list-row"><strong>تصاميم الظهر:</strong> <span id="backList"></span></div>
            <div class="list-row"><strong>أشكال التنورة:</strong> <span id="skirtList"></span></div>
            <div class="list-row"><strong>الزخارف:</strong> <span id="ornamentList"></span></div>
            <div class="actions">
                <button id="addCartBtn" class="btn secondary">إضافة للسلة</button>
                <button id="waBtn" class="btn">إتمام الطلب عبر واتساب</button>
            </div>
            <div class="small-note">السعر بالدولار الأمريكي</div>
        </div>
    </div>
</div>
<script>
    const APP_ID = 'briefproduce-us.backendless.app';
    const BACKENDLESS_APP_ID = '2E6F9C1A-A874-4B86-B85D-D4BE224CA436';
    const BACKENDLESS_API_KEY = 'D9A7EA80-8140-4F9A-8AD6-45A3FF2369A1';
    const TABLE_NAME = 'Drees';
    const phone = '963994817003';

    function getId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    async function loadProduct() {
        const id = getId();
        if (!id) {
            document.getElementById('content').innerHTML = '<div class=\"empty-msg\">لا يوجد منتج محدد</div>';
            return;
        }
        try {
            const res = await fetch(`https://${APP_ID}/api/data/${TABLE_NAME}/${id}`, {
                headers: {
                    'Content-Type': 'application/json',
                    'application-id': BACKENDLESS_APP_ID,
                    'secret-key': BACKENDLESS_API_KEY
                }
            });
            if (!res.ok) throw new Error('تعذر جلب المنتج');
            const p = await res.json();
            render(p);
        } catch (e) {
            document.getElementById('content').innerHTML = '<div class=\"empty-msg\">تعذر تحميل المنتج</div>';
        }
    }

    function render(product) {
        const toList = (val) => {
            if (Array.isArray(val)) return val;
            if (typeof val === 'string' && val.trim()) return val.split(',').map(v => v.trim()).filter(Boolean);
            return [];
        };

        const imageUrl = product.image || product.fileURL || 'https://via.placeholder.com/500?text=صورة';
        const name = product.name || 'منتج';
        const category = product.category || 'غير مصنف';
        const desc = product.description || 'لا يوجد وصف متاح.';
        const price = (product.price || product.price === 0) ? product.price : 'غير محدد';
        const code = product.code || 'بدون كود';
        const size = product.size || 'غير محدد';
        const fabrics = toList(product.fabricsList);
        const models = toList(product.modelsList);
        const necks = toList(product.neckList);
        const sleeves = toList(product.sleeveList);
        const backs = toList(product.backList);
        const skirts = toList(product.skirtList);
        const ornaments = toList(product.ornamentList);

        document.getElementById('productImage').src = imageUrl;
        document.getElementById('productImage').alt = name;
        document.getElementById('productCategory').innerText = category;
        document.getElementById('productTitle').innerText = name;
        document.getElementById('productPrice').innerHTML = `${price} <small>دولار</small>`;
        document.getElementById('productDesc').innerText = desc;
        document.getElementById('productCode').innerText = `الكود: ${code}`;
        document.getElementById('productSize').innerText = `المقاس: ${size}`;
        document.getElementById('fabricList').innerText = fabrics.length ? fabrics.join('، ') : 'غير محدد';
        document.getElementById('modelList').innerText = models.length ? models.join('، ') : 'غير محدد';
        document.getElementById('neckList').innerText = necks.length ? necks.join('، ') : 'غير محدد';
        document.getElementById('sleeveList').innerText = sleeves.length ? sleeves.join('، ') : 'غير محدد';
        document.getElementById('backList').innerText = backs.length ? backs.join('، ') : 'غير محدد';
        document.getElementById('skirtList').innerText = skirts.length ? skirts.join('، ') : 'غير محدد';
        document.getElementById('ornamentList').innerText = ornaments.length ? ornaments.join('، ') : 'غير محدد';

        document.getElementById('waBtn').onclick = () => {
            const msg = encodeURIComponent(`أرغب بشراء:\n${name}\nالكود: ${code}\nالسعر: ${price} دولار\nالمقاس: ${size}`);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        };

        document.getElementById('addCartBtn').onclick = () => {
            const existing = JSON.parse(localStorage.getItem('cart') || '[]');
            existing.push({ id: product.objectId, name, price, image: imageUrl, code, size });
            localStorage.setItem('cart', JSON.stringify(existing));
            alert('تمت إضافة المنتج للسلة');
        };
    }

    loadProduct();
</script>
</body>
</html>
