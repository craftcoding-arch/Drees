<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', system-ui, sans-serif;
            font-size: 12px;
            border-radius: 0 !important;
        }
        body {
            background: linear-gradient(135deg, #fef9f7, #fff5f2);
            color: #2d1b1b;
            padding: 1.5rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            padding: 1.8rem;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: #c44536;
        }
        .back-link {
            color: #2c3e2f;
            text-decoration: none;
            font-weight: 700;
        }
        .layout {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .gallery {
            display: grid;
            gap: 12px;
        }
        .hero-img {
            width: 100%;
            max-height: 420px;
            min-height: 320px;
            object-fit: cover;
            background: #f7edea;
            border: 1px solid #eadad3;
            cursor: zoom-in;
        }
        .info h1 {
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
        }
        .pill {
            display: inline-block;
            background: #f0e1dc;
            color: #c44536;
            padding: 0.3rem 0.8rem;
            margin-bottom: 0.7rem;
            font-weight: 700;
        }
        .price {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0.6rem 0;
        }
        .desc {
            line-height: 1.6;
            color: #5b4744;
            margin: 0.4rem 0 1rem;
        }
        .meta { margin: 0.3rem 0; color: #5b4744; font-weight: 700; }
        .list-row { margin: 0.25rem 0; color: #6b5652; }
        .actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1200;
        }
        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 520px;
            padding: 1.5rem;
            text-align: right;
        }
        .close-modal { cursor: pointer; font-size: 1.4rem; float: left; }
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            background: #000;
        }
        .btn {
            border: none;
            cursor: pointer;
            padding: 0.65rem 1.2rem;
            color: #fff;
            font-weight: 700;
            background: #c44536;
        }
        .btn.secondary { background: #2c3e2f; }
        .small-note { color: #8a6f68; margin-top: 0.4rem; }
        .empty-msg { padding: 2rem; text-align: center; color: #8a6f68; }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="logo">💍 ليالي الزفاف</div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button id="cartBtn" class="btn" style="background:#2c3e2f; padding:0.45rem 0.9rem;">🛒 السلة</button>
            <a class="back-link" href="index.html">عودة للمتجر</a>
        </div>
    </div>
    <div id="content" class="layout">
        <div class="gallery">
            <img id="productImageFront" class="hero-img" src="" alt="">
            <img id="productImageBack" class="hero-img" src="" alt="">
        </div>
        <div class="info">
            <div class="pill" id="productCategory"></div>
            <h1 id="productTitle"></h1>
            <div class="price" id="productPrice"></div>
            <div class="rent-tag" id="productRent" style="color:#5b4744;font-weight:700;"></div>
            <div class="meta" id="productCode"></div>
            <div class="meta" id="productSize"></div>
            <p class="desc" id="productDesc"></p>
            <div class="list-row"><strong>الأقمشة:</strong> <span id="fabricList"></span></div>
            <div class="list-row"><strong>الموديلات:</strong> <span id="modelList"></span></div>
            <div class="actions" style="flex-direction:column; align-items:flex-start; gap:0.4rem;">
                <button id="addCartBtn" class="btn secondary">إضافة للسلة</button>
                <div id="detailMsg" class="small-note"></div>
            </div>
            <div class="small-note">السعر بالدولار الأمريكي</div>
        </div>
    </div>
</div>
<div id="lightbox" class="lightbox">
    <img id="lightboxImg" src="" alt="">
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeCart">&times;</span>
        <h2>🛒 السلة</h2>
        <div id="cartList"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin:0.8rem 0;">
            <strong>الإجمالي:</strong>
            <span id="cartTotal">0</span> دولار
        </div>
        <button id="checkoutBtn" class="btn" style="width:100%; background:#c44536;">إتمام الطلب عبر واتساب</button>
    </div>
</div>
<script>
    const APP_ID = 'briefproduce-us.backendless.app';
    const BACKENDLESS_APP_ID = '2E6F9C1A-A874-4B86-B85D-D4BE224CA436';
    const BACKENDLESS_API_KEY = 'D9A7EA80-8140-4F9A-8AD6-45A3FF2369A1';
    const TABLE_NAME = 'Drees';
    const phone = '963994817003';
    const CART_KEY = 'cart';

    function loadCart(){
        try{ return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e){ return []; }
    }
    function saveCart(data){ localStorage.setItem(CART_KEY, JSON.stringify(data)); }

    function getId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    async function loadProduct() {
        const id = getId();
        if (!id) {
            document.getElementById('content').innerHTML = '<div class=\"empty-msg\">لا يوجد منتج محدد</div>';
            return;
        }
        try {
            const res = await fetch(`https://${APP_ID}/api/data/${TABLE_NAME}/${id}`, {
                headers: {
                    'Content-Type': 'application/json',
                    'application-id': BACKENDLESS_APP_ID,
                    'secret-key': BACKENDLESS_API_KEY
                }
            });
            if (!res.ok) throw new Error('تعذر جلب المنتج');
            const p = await res.json();
            render(p);
        } catch (e) {
            document.getElementById('content').innerHTML = '<div class=\"empty-msg\">تعذر تحميل المنتج</div>';
        }
    }

    function render(product) {
        const toList = (val) => {
            if (Array.isArray(val)) return val;
            if (typeof val === 'string' && val.trim()) return val.split(',').map(v => v.trim()).filter(Boolean);
            return [];
        };

        const frontUrl = product.imageFront || product.image || product.fileURL || 'https://via.placeholder.com/500?text=صورة+أمام';
        const backUrl = product.imageBack || frontUrl || 'https://via.placeholder.com/500?text=صورة+خلف';
        const name = product.name || 'منتج';
        const category = product.category || 'غير مصنف';
        const desc = product.description || 'لا يوجد وصف متاح.';
        const price = (product.price || product.price === 0) ? product.price : 'غير محدد';
        const rent = (product.rent || product.rent === 0) ? product.rent : null;
        const code = product.code || 'بدون كود';
        const size = product.size || 'غير محدد';
        const fabrics = toList(product.fabricsList);
        const models = toList(product.modelsList);

        document.getElementById('productImageFront').src = frontUrl;
        document.getElementById('productImageFront').alt = name + ' - أمام';
        document.getElementById('productImageBack').src = backUrl;
        document.getElementById('productImageBack').alt = name + ' - خلف';
        document.getElementById('productCategory').innerText = category;
        document.getElementById('productTitle').innerText = name;
        document.getElementById('productPrice').innerHTML = `${price} <small>دولار</small>`;
        document.getElementById('productRent').innerText = rent !== null ? `أجرة: ${rent} دولار` : '';
        document.getElementById('productDesc').innerText = desc;
        document.getElementById('productCode').innerText = `الكود: ${code}`;
        document.getElementById('productSize').innerText = `المقاس: ${size}`;
        document.getElementById('fabricList').innerText = fabrics.length ? fabrics.join('، ') : 'غير محدد';
        document.getElementById('modelList').innerText = models.length ? models.join('، ') : 'غير محدد';

        const addMsg = document.getElementById('detailMsg');

        document.getElementById('addCartBtn').onclick = () => {
            const existing = loadCart();
            existing.push({ id: product.objectId, name, price, rent, type: '', image: frontUrl, code, size: '' });
            saveCart(existing);
            addMsg.textContent = '✅ أضيف للسلة (اختر القياس والنوع من السلة)';
            setTimeout(()=> addMsg.textContent = '', 2000);
        };

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const openLightbox = (src) => {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        };
        document.getElementById('productImageFront').onclick = () => openLightbox(frontUrl);
        document.getElementById('productImageBack').onclick = () => openLightbox(backUrl);
        lightbox.onclick = () => { lightbox.style.display = 'none'; };

        // cart modal with size/type selection
        const cartModal = document.getElementById('cartModal');
        const cartList = document.getElementById('cartList');
        const cartTotal = document.getElementById('cartTotal');
        const cartBtn = document.getElementById('cartBtn');
        const closeCartBtn = document.getElementById('closeCart');
        const checkoutBtn = document.getElementById('checkoutBtn');

        function saveCart(data){ localStorage.setItem('cart', JSON.stringify(data)); }

        function renderCartModal(){
            const data = JSON.parse(localStorage.getItem('cart') || '[]');
            if(data.length===0){
                cartList.innerHTML = '<div class="empty-msg">السلة فارغة</div>';
                return;
            }
            cartList.innerHTML = data.map((item, idx)=>{
                return `
                <div style="padding:8px 0; border-bottom:1px solid #eee; display:flex; gap:8px; align-items:center;">
                    <img src="${item.image || frontUrl}" width="55" height="55" style="object-fit:cover;">
                    <div style="flex:1;">
                        <div style="font-weight:700;">${item.name || 'منتج'}</div>
                        <small>الكود: ${item.code || '-'}</small>
                    </div>
                    <select data-idx="${idx}" data-field="size">
                        <option value="">قياس</option>
                        ${['XS','S','M','L','XL','XXL'].map(s=>`<option ${item.size===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                    <select data-idx="${idx}" data-field="type">
                        <option value="">نوع</option>
                        <option value="buy" ${item.type==='buy'?'selected':''}>شراء</option>
                        <option value="rent" ${item.type==='rent'?'selected':''}>أجرة</option>
                    </select>
                    <button data-remove="${idx}" class="btn" style="background:#a12a2a;padding:4px 8px;">حذف</button>
                </div>`;
            }).join('');

            cartList.querySelectorAll('[data-remove]').forEach(btn=>{
                btn.onclick = ()=>{
                    const idx=Number(btn.getAttribute('data-remove'));
                    data.splice(idx,1);
                    saveCart(data);
                    renderCartModal();
                };
            });

            cartList.querySelectorAll('select[data-field]').forEach(sel=>{
                sel.onchange = ()=>{
                    const idx=Number(sel.getAttribute('data-idx'));
                    const field=sel.getAttribute('data-field');
                    data[idx][field] = sel.value;
                    saveCart(data);
                };
            });

            const total = data.reduce((sum, item)=> sum + Number(item.price || 0), 0);
            if(cartTotal) cartTotal.innerText = total;
        }

        if(cartBtn) cartBtn.onclick = ()=>{ renderCartModal(); cartModal.style.display='flex'; };
        if(closeCartBtn) closeCartBtn.onclick = ()=>{ cartModal.style.display='none'; };
        if(checkoutBtn){
            checkoutBtn.onclick = ()=>{
                const data = loadCart();
                if(data.length===0) return;
                const lines = data.map((item, idx)=>`${idx+1}- ${item.name||'منتج'} | كود:${item.code||'-'} | نوع:${item.type||'غير محدد'} | قياس:${item.size||'غير محدد'} | السعر:${item.price||0}`);
                const total = data.reduce((s,i)=>s + Number(i.price||0),0);
                const msg = encodeURIComponent(`أرغب بإتمام الطلب:\n${lines.join('\n')}\nالإجمالي: ${total} دولار`);
                window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');
            };
        }
        window.addEventListener('click', (e)=>{ if(e.target === cartModal) cartModal.style.display='none'; });
    }

    loadProduct();
</script>
</body>
</html>
